<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>혁신가 검색 — 청도 지역혁신가 아카이브</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink:        #0d0d0d;
  --ink-mid:    #404040;
  --ink-light:  #888888;
  --ink-xlight: #bbbbbb;
  --bg:         #ffffff;
  --bg-2:       #f5f5f5;
  --bg-3:       #ebebeb;
  --rule:       #d8d8d8;
  --white:      #ffffff;

  --serif:  'Noto Serif KR', Georgia, serif;
  --sans:   'Noto Sans KR', system-ui, sans-serif;
  --display:'IM Fell English', Georgia, serif;
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
}

html { scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

/* ── 네비 ──────────────────────────────── */
.site-nav {
  position: sticky;
  top: 0;
  z-index: 500;
  padding: 0 60px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--rule);
}
.nav-logo {
  font-family: var(--serif);
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  text-decoration: none;
}
.nav-logo span {
  font-family: var(--display);
  font-style: italic;
  font-size: 12px;
  font-weight: 400;
  color: var(--ink-light);
  margin-left: 8px;
}
.nav-links { display: flex; align-items: center; gap: 28px; }
.nav-link {
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-light);
  text-decoration: none;
  transition: color 0.2s;
}
.nav-link:hover { color: var(--ink); }
.nav-link.active { color: var(--ink); font-weight: 500; }

/* ══════════════════════════════════════════════
   검색 헤더 블록
══════════════════════════════════════════════ */
.search-header {
  padding: 56px 60px 40px;
  border-bottom: 1px solid var(--rule);
  background: var(--bg-2);
}
.sh-eyebrow {
  font-size: 10px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--ink-light);
  margin-bottom: 16px;
}
.sh-title {
  font-family: var(--serif);
  font-size: 36px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--ink);
  margin-bottom: 32px;
}

/* 검색창 */
.search-input-wrap {
  position: relative;
  max-width: 560px;
  margin-bottom: 28px;
}
.search-input {
  width: 100%;
  height: 52px;
  padding: 0 52px 0 18px;
  font-family: var(--sans);
  font-size: 14px;
  color: var(--ink);
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: 2px;
  outline: none;
  transition: border-color 0.2s;
  letter-spacing: 0.02em;
}
.search-input::placeholder { color: var(--ink-xlight); }
.search-input:focus { border-color: var(--ink); }
.search-icon {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ink-light);
  pointer-events: none;
}

/* 필터 바 */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}
.filter-label {
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-xlight);
  margin-right: 4px;
}
.filter-btn {
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.06em;
  padding: 5px 12px;
  border: 1px solid var(--rule);
  border-radius: 2px;
  background: var(--white);
  color: var(--ink-mid);
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--ink-mid); color: var(--ink); }
.filter-btn.active {
  background: var(--ink);
  color: var(--white);
  border-color: var(--ink);
}

/* 지역 필터 그룹 (별도 줄) */
.filter-group { display: flex; flex-wrap: wrap; gap: 6px; }
.filter-divider {
  width: 1px; height: 20px;
  background: var(--rule);
  margin: 0 4px;
  align-self: center;
}

/* ══════════════════════════════════════════════
   결과 영역
══════════════════════════════════════════════ */
.results-area {
  padding: 40px 60px 80px;
}

.results-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
}
.results-count {
  font-family: var(--serif);
  font-size: 13px;
  color: var(--ink-mid);
}
.results-count strong {
  font-size: 18px;
  color: var(--ink);
  margin-right: 4px;
}
.sort-select {
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--ink-mid);
  background: var(--white);
  border: 1px solid var(--rule);
  padding: 6px 10px;
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}

/* 결과 그리드 */
.results-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1px;
  background: var(--rule);
  border: 1px solid var(--rule);
}

/* 결과 카드 */
.result-card {
  background: var(--white);
  padding: 28px 24px;
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  flex-direction: column;
  gap: 12px;
  text-decoration: none;
  color: inherit;
  animation: cardIn 0.35s var(--ease-out) both;
}
.result-card:hover { background: var(--bg-2); }
@keyframes cardIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.rc-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
}
.rc-photo {
  width: 48px; height: 48px;
  border-radius: 1px;
  background: var(--bg-3);
  flex-shrink: 0;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.rc-photo img {
  width: 100%; height: 100%;
  object-fit: cover;
  filter: grayscale(100%);
}
.rc-photo-init {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 700;
  color: var(--rule);
}
.rc-vol-badge {
  font-family: var(--display);
  font-style: italic;
  font-size: 10px;
  color: var(--ink-xlight);
  letter-spacing: 0.1em;
}

.rc-body {}
.rc-name {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin-bottom: 2px;
}
.rc-org {
  font-size: 11px;
  color: var(--ink-mid);
  margin-bottom: 8px;
}
.rc-tagline {
  font-size: 10px;
  line-height: 1.5;
  color: var(--ink-light);
  margin-bottom: 8px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0.01em;
}
.rc-short-bio {
  font-size: 11px;
  line-height: 1.7;
  color: var(--ink-mid);
  margin-bottom: 10px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  word-break: keep-all;
}

.rc-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.rc-tag {
  font-size: 9px;
  letter-spacing: 0.08em;
  padding: 2px 7px;
  border: 1px solid var(--rule);
  color: var(--ink-light);
}
.rc-tag.highlight {
  background: var(--ink);
  color: var(--white);
  border-color: var(--ink);
}

.rc-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 10px;
  border-top: 1px solid var(--bg-3);
}
.rc-region {
  font-size: 10px;
  color: var(--ink-xlight);
  letter-spacing: 0.05em;
}
.rc-arrow {
  font-size: 11px;
  color: var(--ink-xlight);
  transition: color 0.15s, transform 0.15s;
}
.result-card:hover .rc-arrow { color: var(--ink); transform: translateX(3px); }

/* 빈 결과 */
.empty-state {
  grid-column: 1 / -1;
  padding: 80px 24px;
  text-align: center;
  background: var(--white);
}
.empty-title {
  font-family: var(--serif);
  font-size: 18px;
  color: var(--ink);
  margin-bottom: 8px;
}
.empty-desc { font-size: 12px; color: var(--ink-light); }

/* 로딩 스켈레톤 */
.skeleton {
  background: var(--bg-2);
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.skel-line {
  height: 12px;
  background: var(--bg-3);
  border-radius: 1px;
  animation: shimmer 1.4s ease infinite;
}
.skel-line.w60 { width: 60%; }
.skel-line.w80 { width: 80%; }
.skel-line.w40 { width: 40%; }
@keyframes shimmer {
  0%,100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* ── 반응형 ─────────────────────────────── */
@media (max-width: 768px) {
  .site-nav { padding: 0 24px; }
  .search-header { padding: 40px 24px 32px; }
  .results-area  { padding: 32px 24px 60px; }
  .sh-title { font-size: 28px; }
  .results-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- 네비 -->
<nav class="site-nav">
  <a href="index.html" class="nav-logo">
    청도 지역혁신가
    <span>Archive</span>
  </a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">서재</a>
    <a href="search.html" class="nav-link active">검색</a>
  </div>
</nav>

<!-- 검색 헤더 -->
<section class="search-header">
  <div class="sh-eyebrow">Innovator Search</div>
  <h1 class="sh-title">혁신가 찾기</h1>

  <!-- 텍스트 검색 -->
  <div class="search-input-wrap">
    <input
      type="text"
      class="search-input"
      id="search-input"
      placeholder="이름, 활동, 키워드로 검색"
      autocomplete="off"
    >
    <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <circle cx="7" cy="7" r="4.5"/><path d="M11 11l3 3"/>
    </svg>
  </div>

  <!-- 도메인 필터 -->
  <div class="filter-bar" id="domain-filters">
    <span class="filter-label">분야</span>
    <!-- JS 생성 -->
  </div>

  <!-- 지역 + 권호 필터 -->
  <div class="filter-bar" style="margin-top:10px" id="region-filters">
    <span class="filter-label">지역</span>
    <!-- JS 생성 -->
    <div class="filter-divider"></div>
    <span class="filter-label">권호</span>
    <!-- JS 생성 -->
  </div>
</section>

<!-- 결과 영역 -->
<section class="results-area">
  <div class="results-meta">
    <div class="results-count" id="results-count">
      <strong>—</strong>명의 혁신가
    </div>
    <select class="sort-select" id="sort-select">
      <option value="page">등록 순</option>
      <option value="name">이름 순</option>
      <option value="region">지역 순</option>
    </select>
  </div>
  <div class="results-grid" id="results-grid">
    <!-- 스켈레톤 -->
    ${[1,2,3,4,5,6].map(() => `
      <div class="skeleton">
        <div class="skel-line w40"></div>
        <div class="skel-line w80"></div>
        <div class="skel-line w60"></div>
      </div>`).join('')}
  </div>
</section>

<script>
const DATA_BASE = './data';

/* ── 상태 ────────────────────────────────── */
let allData      = [];   // 전체 혁신가 목록 (index.json 기반)
let queryText    = '';
let activeDomains = new Set();
let activeRegions = new Set();
let activeVols    = new Set();
let sortMode     = 'page';

/* ── 초기화 ──────────────────────────────── */
async function init() {
  try {
    // index.json 로드 (통합 색인)
    const idx = await fetch(`${DATA_BASE}/index.json`).then(r => {
      if (!r.ok) throw new Error('index.json 없음');
      return r.json();
    });
    allData = idx.innovators;

    buildFilters();
    renderResults();

    // URL 쿼리스트링으로 초기 검색어 처리
    const urlQ = new URLSearchParams(location.search).get('q');
    if (urlQ) {
      document.getElementById('search-input').value = urlQ;
      queryText = urlQ.trim().toLowerCase();
      renderResults();
    }
  } catch (err) {
    console.error(err);
    document.getElementById('results-grid').innerHTML =
      `<div class="empty-state">
        <div class="empty-title">데이터를 불러오지 못했습니다</div>
        <div class="empty-desc">${err.message}<br>웹서버를 통해 열어주세요 (npx serve .)</div>
      </div>`;
  }
}

/* ── 필터 버튼 생성 ─────────────────────── */
function buildFilters() {
  // 도메인 수집
  const domains = [...new Set(allData.flatMap(p => p.domains || []))].sort();
  // 지역 수집
  const regions = [...new Set(allData.map(p => p.region).filter(Boolean))].sort();
  // 권호 수집
  const vols = [...new Set(allData.map(p => p.vol))].sort((a,b) => a-b);

  const domainEl = document.getElementById('domain-filters');
  // 전체 버튼
  const allDomBtn = makeFilterBtn('전체', true, () => {
    activeDomains.clear();
    domainEl.querySelectorAll('.filter-btn').forEach((b,i) => b.classList.toggle('active', i===0));
    renderResults();
  });
  domainEl.appendChild(allDomBtn);
  domains.forEach(d => {
    domainEl.appendChild(makeFilterBtn(d, false, () => {
      toggleFilter(activeDomains, d);
      // "전체" 버튼 active 토글
      allDomBtn.classList.toggle('active', activeDomains.size === 0);
      renderResults();
    }));
  });

  const regionEl = document.getElementById('region-filters');
  regions.forEach(r => {
    regionEl.appendChild(makeFilterBtn(r, false, () => {
      toggleFilter(activeRegions, r);
      renderResults();
    }));
  });

  // 권호 필터 (divider 뒤에 삽입)
  const divider = regionEl.querySelector('.filter-divider');
  // vol 라벨
  const volLabel = document.createElement('span');
  volLabel.className = 'filter-label';
  volLabel.style.marginLeft = '0';
  regionEl.insertBefore(volLabel, divider.nextSibling);
  vols.forEach(v => {
    const btn = makeFilterBtn(`Vol.${v}`, false, () => {
      toggleFilter(activeVols, v);
      renderResults();
    });
    regionEl.appendChild(btn);
  });
}

function makeFilterBtn(label, isActive, onClick) {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (isActive ? ' active' : '');
  btn.textContent = label;
  btn.addEventListener('click', () => {
    onClick();
    // domain "전체"가 아닌 버튼들의 active는 toggleFilter에서 관리
    if (label !== '전체' && !label.startsWith('Vol.')) {
      btn.classList.toggle('active');
    }
    if (label.startsWith('Vol.')) btn.classList.toggle('active');
  });
  return btn;
}

function toggleFilter(set, val) {
  set.has(val) ? set.delete(val) : set.add(val);
}

/* ── 검색 입력 이벤트 ─────────────────────── */
let debounceTimer;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    queryText = e.target.value.trim().toLowerCase();
    renderResults();
  }, 180);
});

document.getElementById('sort-select').addEventListener('change', e => {
  sortMode = e.target.value;
  renderResults();
});

/* ── 필터링 로직 ─────────────────────────── */
function filtered() {
  return allData.filter(p => {
    // 텍스트 검색: 이름, 조직, 지역, 활동, 프로젝트, 도메인
    if (queryText) {
      const haystack = [p.name, p.org, p.region, p.activity, p.projects,
        p.tagline, p.short_bio, ...(p.domains||[])].join(' ').toLowerCase();
      if (!haystack.includes(queryText)) return false;
    }
    // 도메인 필터 (OR)
    if (activeDomains.size > 0) {
      const pDomains = p.domains || [];
      if (!pDomains.some(d => activeDomains.has(d))) return false;
    }
    // 지역 필터
    if (activeRegions.size > 0 && !activeRegions.has(p.region)) return false;
    // 권호 필터
    if (activeVols.size > 0 && !activeVols.has(p.vol)) return false;
    return true;
  });
}

function sorted(list) {
  return [...list].sort((a, b) => {
    if (sortMode === 'name')   return a.name.localeCompare(b.name);
    if (sortMode === 'region') return (a.region||'').localeCompare(b.region||'');
    // page: vol 먼저, 그 다음 page
    return a.vol !== b.vol ? a.vol - b.vol : a.page - b.page;
  });
}

/* ── 결과 렌더 ───────────────────────────── */
function renderResults() {
  const list  = sorted(filtered());
  const grid  = document.getElementById('results-grid');
  const count = document.getElementById('results-count');

  count.innerHTML = `<strong>${list.length}</strong>명의 혁신가`;

  if (list.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-title">검색 결과가 없습니다</div>
      <div class="empty-desc">다른 키워드나 필터를 시도해보세요</div>
    </div>`;
    return;
  }

  grid.innerHTML = list.map((p, i) => makeCard(p, i)).join('');
}

function makeCard(p, idx) {
  const delay = Math.min(idx * 0.03, 0.3);
  const domains = (p.domains || []);

  // 검색어 하이라이트 여부
  const isMatch = d => queryText && d.toLowerCase().includes(queryText);

  const tagsHTML = domains.map(d =>
    `<span class="rc-tag${isMatch(d) ? ' highlight' : ''}">${d}</span>`
  ).join('');

  const link = `book.html?vol=${p.vol}&page=${p.page}`;

  return `<a class="result-card" href="${link}" style="animation-delay:${delay}s">
    <div class="rc-top">
      <div class="rc-photo">
        <div class="rc-photo-init">${p.name[0]}</div>
      </div>
      <div class="rc-vol-badge">Vol.${p.vol}</div>
    </div>
    <div class="rc-body">
      <div class="rc-name">${highlight(p.name)}</div>
      <div class="rc-org">${highlight(p.org)}</div>
      ${p.tagline ? `<div class="rc-tagline">${highlight(p.tagline)}</div>` : ''}
      ${p.short_bio ? `<div class="rc-short-bio">${highlight(p.short_bio)}</div>` : ''}
      <div class="rc-tags">${tagsHTML}</div>
    </div>
    <div class="rc-footer">
      <span class="rc-region">${p.region || ''}</span>
      <span class="rc-arrow">→</span>
    </div>
  </a>`;
}

/* 텍스트 하이라이트 */
function highlight(text) {
  if (!queryText || !text) return text || '';
  const escaped = queryText.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'),
    '<mark style="background:rgba(0,0,0,0.08);border-radius:1px;padding:0 1px">$1</mark>');
}

init();
</script>
</body>
</html>

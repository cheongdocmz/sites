<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지도 탐색 — 청도 지역혁신가</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink:        #0d0d0d;
  --ink-mid:    #3a3a3a;
  --ink-light:  #808080;
  --ink-xlight: #b8b8b8;
  --ink-ghost:  #d4d4d0;
  --bg:         #ffffff;
  --bg-warm:    #f8f7f4;
  --bg-mid:     #f0efe9;
  --rule:       #e0dfd8;
  --rule-dark:  #c8c7bf;
  --white:      #ffffff;
  --map-region: #d6e4d2;
  --map-stroke: #b8ccb3;
  --map-hover:  #a8c4a2;
  --map-active: #5a8a52;
  --serif:   'Noto Serif KR', Georgia, serif;
  --sans:    'Noto Sans KR', system-ui, sans-serif;
  --display: 'IM Fell English', Georgia, serif;
  --ease-expo: cubic-bezier(0.16, 1, 0.3, 1);
  --max-w: 1440px;
}
html { scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--bg-warm);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

/* ── 1440px 래퍼 ── */
.page-wrap {
  max-width: var(--max-w);
  margin: 0 auto;
  background: var(--bg);
  min-height: 100vh;
  box-shadow: 0 0 0 1px var(--rule), 0 0 60px rgba(0,0,0,0.04);
  display: flex;
  flex-direction: column;
}

/* ── 네비 ── */
.site-nav {
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: var(--max-w);
  z-index: 500;
  height: 60px;
  padding: 0 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(255,255,255,0.94);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--rule);
}
.nav-logo {
  font-family: var(--serif);
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  text-decoration: none;
  letter-spacing: -0.02em;
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.nav-logo-sub {
  font-family: var(--display);
  font-style: italic;
  font-size: 11px;
  color: var(--ink-light);
  letter-spacing: 0.05em;
}
.nav-links { display: flex; align-items: center; gap: 36px; }
.nav-link {
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-light);
  text-decoration: none;
  transition: color 0.2s;
}
.nav-link:hover { color: var(--ink); }
.nav-link.active { color: var(--ink); border-bottom: 1px solid var(--ink); padding-bottom: 1px; }
.nav-back-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-mid);
  background: none;
  border: 1px solid var(--rule-dark);
  border-radius: 2px;
  padding: 7px 16px;
  cursor: pointer;
  font-family: var(--sans);
  text-decoration: none;
  transition: all 0.2s;
}
.nav-back-btn:hover { background: var(--bg-mid); border-color: var(--ink-mid); }

/* ── 배너 (압축) ── */
.page-banner {
  margin-top: 60px;
  padding: 28px 56px 24px;
  border-bottom: 1px solid var(--rule);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  flex-shrink: 0;
}
.banner-left { display: flex; align-items: baseline; gap: 16px; }
.banner-title {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.025em;
  color: var(--ink);
}
.banner-title-en {
  font-family: var(--display);
  font-style: italic;
  font-size: 13px;
  color: var(--ink-light);
}
.banner-stats { display: flex; gap: 28px; }
.stat-item {}
.stat-num {
  font-family: var(--display);
  font-size: 24px;
  color: var(--ink);
  line-height: 1;
  display: block;
}
.stat-label {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-light);
  display: block;
  margin-top: 3px;
}

/* ── 메인 2단 ── */
.main-layout {
  display: grid;
  grid-template-columns: 1fr 400px;
  flex: 1;
  overflow: hidden;
}

/* ── 지도 패널 (왼쪽 sticky) ── */
.map-panel {
  border-right: 1px solid var(--rule);
  position: sticky;
  top: 60px;
  height: calc(100vh - 60px - 89px);
  display: flex;
  flex-direction: column;
  padding: 36px 48px;
  background: var(--bg-warm);
  overflow: hidden;
}
.map-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-shrink: 0;
}
.map-label {
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--ink-xlight);
}
.map-selected-info { font-size: 12px; color: var(--ink-mid); font-family: var(--serif); }
.map-selected-info span { color: var(--ink); font-weight: 500; }
.map-container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
}
.map-svg { width: 100%; max-width: 560px; height: auto; }

.region-path {
  fill: var(--map-region);
  stroke: var(--map-stroke);
  stroke-width: 1.5;
  cursor: pointer;
  transition: fill 0.2s, stroke 0.2s;
}
.region-path:hover { fill: var(--map-hover); stroke: #8aaa84; }
.region-path.active { fill: var(--map-active); stroke: #3a6a32; }
.region-label {
  font-family: var(--sans);
  font-size: 11px;
  fill: #3a5836;
  pointer-events: none;
  text-anchor: middle;
  dominant-baseline: middle;
}
.region-label.active { fill: #fff; font-weight: 500; }
.region-count-badge {
  font-family: var(--display);
  font-style: italic;
  font-size: 13px;
  fill: #6a9864;
  pointer-events: none;
  text-anchor: middle;
}
.region-count-badge.active { fill: rgba(255,255,255,0.7); }

.map-footer {
  flex-shrink: 0;
  margin-top: 16px;
  display: flex;
  align-items: center;
  gap: 20px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  color: var(--ink-light);
}
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.map-reset-btn {
  margin-left: auto;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--ink-light);
  background: none;
  border: 1px solid var(--rule-dark);
  border-radius: 2px;
  padding: 5px 12px;
  cursor: pointer;
  font-family: var(--sans);
  transition: all 0.2s;
}
.map-reset-btn:hover { color: var(--ink); border-color: var(--ink); }

/* ── 리스트 패널 (오른쪽) ── */
.list-panel {
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 60px;
  height: calc(100vh - 60px - 89px);
  overflow: hidden;
}
.list-header {
  padding: 20px 28px 16px;
  border-bottom: 1px solid var(--rule);
  flex-shrink: 0;
}
.list-header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.list-title-text { font-family: var(--serif); font-size: 15px; font-weight: 500; color: var(--ink); }
.list-count-text { font-family: var(--display); font-style: italic; font-size: 13px; color: var(--ink-light); }
.list-filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-chip {
  font-size: 10px;
  letter-spacing: 0.04em;
  padding: 4px 10px;
  border: 1px solid var(--rule-dark);
  border-radius: 20px;
  cursor: pointer;
  color: var(--ink-light);
  background: none;
  font-family: var(--sans);
  transition: all 0.15s;
  white-space: nowrap;
}
.filter-chip:hover { border-color: var(--ink-mid); color: var(--ink-mid); }
.filter-chip.active { background: var(--ink); color: var(--white); border-color: var(--ink); }

.list-scroll {
  flex: 1;
  overflow-y: auto;
  overscroll-behavior: contain;
}
.list-scroll::-webkit-scrollbar { width: 3px; }
.list-scroll::-webkit-scrollbar-track { background: transparent; }
.list-scroll::-webkit-scrollbar-thumb { background: var(--rule-dark); border-radius: 2px; }

.vol-section-header {
  padding: 14px 28px 10px;
  position: sticky;
  top: 0;
  background: rgba(255,255,255,0.96);
  backdrop-filter: blur(4px);
  border-bottom: 1px solid var(--rule);
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 10px;
}
.vol-section-badge { font-family: var(--display); font-style: italic; font-size: 10px; color: var(--ink-xlight); letter-spacing: 0.18em; }
.vol-section-rule { flex: 1; height: 1px; background: var(--rule); }
.vol-section-count { font-size: 10px; color: var(--ink-xlight); }

.person-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 28px;
  border-bottom: 1px solid var(--rule);
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  transition: background 0.12s;
}
.person-row:hover { background: var(--bg-warm); }
.person-row:last-child { border-bottom: none; }
.person-initial {
  width: 36px; height: 36px;
  flex-shrink: 0;
  background: var(--bg-mid);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--serif);
  font-size: 14px;
  font-weight: 700;
  color: var(--ink-mid);
  border-radius: 2px;
  transition: background 0.15s, color 0.15s;
}
.person-row:hover .person-initial { background: var(--ink); color: var(--white); }
.person-info { flex: 1; min-width: 0; }
.person-name { font-family: var(--serif); font-size: 13px; font-weight: 500; color: var(--ink); margin-bottom: 2px; }
.person-org { font-size: 11px; color: var(--ink-light); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.person-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.person-region { font-size: 10px; color: var(--ink-xlight); }
.person-domain-tag { font-size: 9px; padding: 2px 7px; border-radius: 1px; white-space: nowrap; }
.dtag-0 { background: #eceae4; color: #3a3830; }
.dtag-1 { background: #dde8e4; color: #2a3832; }
.dtag-2 { background: #e4dde8; color: #382a3a; }
.dtag-3 { background: #e8e4dd; color: #38362a; }
.dtag-4 { background: #dde4e8; color: #2a3438; }
.dtag-5 { background: #e8dddd; color: #382a2a; }
.dtag-6 { background: #dde8dd; color: #2a382a; }
.dtag-7 { background: #e8e8dd; color: #38382a; }

.empty-state { padding: 48px 28px; text-align: center; }
.empty-state-text { font-size: 13px; color: var(--ink-xlight); line-height: 2; }

/* ── 푸터 ── */
.site-footer {
  flex-shrink: 0;
  padding: 28px 56px;
  border-top: 1px solid var(--rule);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--bg-warm);
  grid-column: 1 / -1;
}
.footer-left { font-family: var(--serif); font-size: 13px; font-weight: 500; color: var(--ink-mid); }
.footer-right { font-size: 11px; color: var(--ink-light); }

/* ── 반응형 ── */
@media (max-width: 1100px) {
  .main-layout { grid-template-columns: 1fr 340px; }
  .map-panel { padding: 28px 32px; }
}
@media (max-width: 800px) {
  .main-layout { display: flex; flex-direction: column; }
  .map-panel {
    position: static;
    height: auto;
    min-height: 340px;
    border-right: none;
    border-bottom: 1px solid var(--rule);
  }
  .list-panel { position: static; height: auto; max-height: 60vh; }
  .page-banner { padding: 20px 24px; flex-direction: column; align-items: flex-start; gap: 16px; }
  .site-nav { padding: 0 24px; }
}
@media (max-width: 600px) {
  .nav-links { gap: 14px; }
}
</style>
</head>
<body>
<div class="page-wrap">

<nav class="site-nav">
  <a href="index.html" class="nav-logo">
    청도 지역혁신가
    <span class="nav-logo-sub">Archive</span>
  </a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">서재</a>
    <a href="map.html" class="nav-link active">지도 탐색</a>
    <a href="search.html" class="nav-link">검색</a>
    <a href="index.html" class="nav-back-btn">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 2L4 6l4 4"/>
      </svg>
      서재로
    </a>
  </div>
</nav>

<div class="page-banner">
  <div class="banner-left">
    <h1 class="banner-title">지도 탐색</h1>
    <span class="banner-title-en">Explore by Region</span>
  </div>
  <div class="banner-stats">
    <div class="stat-item">
      <span class="stat-num" id="stat-total">28</span>
      <span class="stat-label">Innovators</span>
    </div>
    <div class="stat-item">
      <span class="stat-num">9</span>
      <span class="stat-label">Regions</span>
    </div>
  </div>
</div>

<div class="main-layout">

  <div class="map-panel">
    <div class="map-panel-header">
      <span class="map-label">읍·면 클릭으로 필터링</span>
      <span class="map-selected-info" id="map-info">전체 <span>9개 지역</span></span>
    </div>
    <div class="map-container">
      <svg class="map-svg" viewBox="0 0 560 500" xmlns="http://www.w3.org/2000/svg" id="cheongdo-map">
        <rect width="560" height="500" fill="#eef4ec" rx="8"/>

        <g class="region-group" data-region="청도읍" data-count="4">
          <rect class="region-path" x="208" y="168" width="124" height="92" rx="4"/>
          <text class="region-label" x="270" y="206">청도읍</text>
          <text class="region-count-badge" x="270" y="224">4</text>
        </g>
        <g class="region-group" data-region="화양읍" data-count="6">
          <rect class="region-path" x="344" y="168" width="124" height="92" rx="4"/>
          <text class="region-label" x="406" y="206">화양읍</text>
          <text class="region-count-badge" x="406" y="224">6</text>
        </g>
        <g class="region-group" data-region="각남면" data-count="3">
          <rect class="region-path" x="92" y="280" width="112" height="82" rx="4"/>
          <text class="region-label" x="148" y="314">각남면</text>
          <text class="region-count-badge" x="148" y="332">3</text>
        </g>
        <g class="region-group" data-region="각북면" data-count="1">
          <rect class="region-path" x="92" y="168" width="104" height="82" rx="4"/>
          <text class="region-label" x="144" y="202">각북면</text>
          <text class="region-count-badge" x="144" y="220">1</text>
        </g>
        <g class="region-group" data-region="매전면" data-count="3">
          <rect class="region-path" x="208" y="280" width="124" height="82" rx="4"/>
          <text class="region-label" x="270" y="314">매전면</text>
          <text class="region-count-badge" x="270" y="332">3</text>
        </g>
        <g class="region-group" data-region="풍각면" data-count="2">
          <rect class="region-path" x="72" y="380" width="112" height="78" rx="4"/>
          <text class="region-label" x="128" y="412">풍각면</text>
          <text class="region-count-badge" x="128" y="430">2</text>
        </g>
        <g class="region-group" data-region="이서면" data-count="4">
          <rect class="region-path" x="344" y="280" width="114" height="82" rx="4"/>

          <text class="region-count-badge" x="401" y="332">4</text>
        </g>
        <g class="region-group" data-region="운문면" data-count="2">
          <rect class="region-path" x="344" y="64" width="114" height="82" rx="4"/>
          <text class="region-label" x="401" y="98">운문면</text>
          <text class="region-count-badge" x="401" y="116">2</text>
        </g>
        <g class="region-group" data-region="금천면" data-count="2">
          <rect class="region-path" x="208" y="64" width="114" height="82" rx="4"/>
          <text class="region-label" x="265" y="98">금천면</text>
          <text class="region-count-badge" x="265" y="116">2</text>
        </g>

        <g transform="translate(510,450)">
          <circle cx="0" cy="0" r="16" fill="rgba(255,255,255,0.7)" stroke="#c8c7bf" stroke-width="0.5"/>
          <text x="0" y="-4" text-anchor="middle" font-size="7" fill="#808080" font-family="sans-serif">N</text>
          <line x1="0" y1="-10" x2="0" y2="10" stroke="#b8b8b8" stroke-width="0.5"/>
          <line x1="-10" y1="0" x2="10" y2="0" stroke="#b8b8b8" stroke-width="0.5"/>
        </g>
        <text x="28" y="482" font-size="9" fill="#a0a098" font-family="sans-serif" letter-spacing="0.08em">CHEONGDO-GUN · GYEONGBUK</text>
      </svg>
    </div>
    <div class="map-footer">
      <div class="legend-item">
        <div class="legend-dot" style="background: var(--map-region); border: 1px solid var(--map-stroke);"></div>
        전체
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background: var(--map-active);"></div>
        선택
      </div>
      <button class="map-reset-btn" onclick="resetRegion()">전체 보기</button>
    </div>
  </div>

  <div class="list-panel">
    <div class="list-header">
      <div class="list-header-top">
        <span class="list-title-text" id="list-title">전체 혁신가</span>
        <span class="list-count-text" id="list-count">28인</span>
      </div>
      <div class="list-filter-row" id="domain-filters">
        <button class="filter-chip active" data-domain="all" onclick="filterDomain(this,'all')">전체</button>
        <button class="filter-chip" data-domain="농식품" onclick="filterDomain(this,'농식품')">농식품</button>
        <button class="filter-chip" data-domain="식음료" onclick="filterDomain(this,'식음료')">식음료</button>
        <button class="filter-chip" data-domain="교육" onclick="filterDomain(this,'교육')">교육</button>
        <button class="filter-chip" data-domain="커뮤니티, 마을, 공동체" onclick="filterDomain(this,'커뮤니티, 마을, 공동체')">커뮤니티</button>
        <button class="filter-chip" data-domain="상품판매 및 체험" onclick="filterDomain(this,'상품판매 및 체험')">상품·체험</button>
        <button class="filter-chip" data-domain="문화 예술" onclick="filterDomain(this,'문화 예술')">문화·예술</button>
      </div>
    </div>
    <div class="list-scroll" id="list-scroll"></div>
  </div>

</div>

<footer class="site-footer">
  <div class="footer-left">청도혁신센터</div>
  <div class="footer-right">Cheongdo Innovation Center · <span id="footer-year"></span></div>
</footer>

<script>

/* URL 파라미터로 초기 지역 설정 */
const urlParams = new URLSearchParams(window.location.search);
let activeRegion = urlParams.get('region') || null;
let activeDomain = 'all';

/* 지도 인터랙션 */
document.querySelectorAll('.region-group').forEach(g => {
  g.addEventListener('click', () => {
    const r = g.dataset.region;
    activeRegion === r ? resetRegion() : setRegion(r);
  });
});

function setRegion(region) {
  activeRegion = region;
  document.querySelectorAll('.region-group').forEach(g => {
    const on = g.dataset.region === region;
    g.querySelector('.region-path').classList.toggle('active', on);
    g.querySelector('.region-label').classList.toggle('active', on);
    g.querySelector('.region-count-badge').classList.toggle('active', on);
  });
  const cnt = DUMMY.filter(p => p.region === region).length;
  document.getElementById('map-info').innerHTML = `<span>${region}</span> · ${cnt}인`;
  renderList();
}

function resetRegion() {
  activeRegion = null;
  document.querySelectorAll('.region-path, .region-label, .region-count-badge')
    .forEach(el => el.classList.remove('active'));
  document.getElementById('map-info').innerHTML = `전체 <span>9개 지역</span>`;
  renderList();
}

function filterDomain(btn, domain) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  activeDomain = domain;
  renderList();
}

function renderList() {
  let data = DUMMY;
  if (activeRegion) data = data.filter(p => p.region === activeRegion);
  if (activeDomain !== 'all') data = data.filter(p => p.domains.includes(activeDomain));

  document.getElementById('list-title').textContent = activeRegion || '전체 혁신가';
  document.getElementById('list-count').textContent = `${data.length}인`;

  if (!data.length) {
    document.getElementById('list-scroll').innerHTML =
      `<div class="empty-state"><p class="empty-state-text">해당 조건의 혁신가가 없습니다.<br>지역 또는 분야 필터를 조정해보세요.</p></div>`;
    return;
  }

  const byVol = {};
  data.forEach(p => { if (!byVol[p.vol]) byVol[p.vol] = []; byVol[p.vol].push(p); });

  let html = '';
  Object.entries(byVol).forEach(([vol, persons]) => {
    html += `<div class="vol-section-header">
      <span class="vol-section-badge">Vol.${vol}</span>
      <div class="vol-section-rule"></div>
      <span class="vol-section-count">${persons.length}인</span>
    </div>`;
    persons.forEach(p => {
      html += `<a class="person-row" href="book.html?vol=${p.vol}&page=${p.page}">
        <div class="person-initial">${p.name.charAt(0)}</div>
        <div class="person-info">
          <div class="person-name">${p.name}</div>
          <div class="person-org">${p.org}</div>
        </div>
        <div class="person-meta">
          <span class="person-region">${p.region}</span>
          <span class="person-domain-tag ${domainClass(p.domains[0])}">${DOMAIN_SHORT[p.domains[0]]||p.domains[0]}</span>
        </div>
      </a>`;
    });
  });
  document.getElementById('list-scroll').innerHTML = html;
}

/* 초기 지역이 URL에 있으면 활성화 */
if (activeRegion) setRegion(activeRegion);
else renderList();
</script>
